<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entering Whisper Realm</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="shortcut icon" type="image/load.png" href="image/load.png" >

  <style>
    :root {
      --dark: #2a0435;
      --secondary: #43135a;
      --primary: #b5179e;
      --accent: #f72585;
      --text-light: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.7);
      --glow: 0 0 15px rgba(247, 37, 133, 0.6);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, var(--dark), var(--secondary));
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    .loading-container {
      text-align: center;
      max-width: 500px;
      padding: 2rem;
      position: relative;
      z-index: 2;
      background: rgba(42, 4, 53, 0.6);
      border-radius: 20px;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      box-shadow: var(--glow);
      border: 1px solid rgba(181, 23, 158, 0.2);
      transform: translateY(0);
      animation: floatContainer 6s ease-in-out infinite;
    }

    @keyframes floatContainer {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .logo {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent);
      position: relative;
      display: inline-block;
    }

    .logo::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 50%;
      box-shadow: 0 0 30px var(--accent);
      opacity: 0;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0; }
      50% { transform: scale(1.1); opacity: 0.7; }
      100% { transform: scale(0.95); opacity: 0; }
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 2rem;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      position: relative;
      display: inline-block;
    }

    h1::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 25%;
      width: 50%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .progress-container {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      margin: 2.5rem 0;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 10px;
      transition: width 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .progress-bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(
        90deg,
        rgba(255, 255, 255, 0) 0%,
        rgba(255, 255, 255, 0.6) 50%,
        rgba(255, 255, 255, 0) 100%
      );
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .loading-text {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 0.5rem;
      font-weight: 300;
      min-height: 20px;
    }

    .btn-group {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 3rem;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      padding: 0.8rem 1.8rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      box-shadow: 0 4px 15px rgba(247, 37, 133, 0.3);
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.2),
        transparent
      );
      transition: 0.5s;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(247, 37, 133, 0.5);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--text-light);
      box-shadow: none;
    }

    .btn-outline:hover {
      background: rgba(181, 23, 158, 0.2);
      box-shadow: 0 0 15px rgba(181, 23, 158, 0.3);
    }

    .floating-ghosts {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 1;
    }

    .ghost {
      position: absolute;
      font-size: 1.8rem;
      opacity: 0.2;
      animation: float 15s linear infinite;
      filter: drop-shadow(0 0 5px var(--accent));
    }

    .ghost:nth-child(2) {
      animation-delay: 3s;
      font-size: 2.2rem;
    }
    .ghost:nth-child(3) {
      animation-delay: 6s;
      font-size: 1.5rem;
    }
    .ghost:nth-child(4) {
      animation-delay: 9s;
      font-size: 2rem;
    }
    .ghost:nth-child(5) {
      animation-delay: 12s;
      font-size: 1.7rem;
    }

    @keyframes float {
      0% { 
        transform: translate(0, 0) rotate(0deg);
        opacity: 0.2;
      }
      25% { 
        transform: translate(50px, -30px) rotate(5deg);
        opacity: 0.3;
      }
      50% { 
        transform: translate(100px, 0) rotate(0deg);
        opacity: 0.2;
      }
      75% { 
        transform: translate(50px, 30px) rotate(-5deg);
        opacity: 0.3;
      }
      100% { 
        transform: translate(0, 0) rotate(0deg);
        opacity: 0.2;
      }
    }

    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
    }

    @media (max-width: 600px) {
      .loading-container {
        padding: 1.5rem;
        margin: 1rem;
        width: calc(100% - 2rem);
      }
      
      .logo {
        font-size: 3rem;
      }
      
      h1 {
        font-size: 1.5rem;
      }
      
      .btn-group {
        flex-direction: column;
        align-items: center;
      }
      
      .btn {
        width: 100%;
        justify-content: center;
        padding: 0.8rem;
      }
    }

    /* Dark mode toggle (optional) */
    .theme-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-backdrop-filter: blur(5px);
      backdrop-filter: blur(5px);
    }

    .theme-toggle:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="floating-ghosts">
    <div class="ghost" style="top:15%; left:10%;"><i class="fas fa-ghost"></i></div>
    <div class="ghost" style="top:75%; left:85%;"><i class="fas fa-ghost"></i></div>
    <div class="ghost" style="top:35%; left:70%;"><i class="fas fa-ghost"></i></div>
    <div class="ghost" style="top:80%; left:20%;"><i class="fas fa-ghost"></i></div>
    <div class="ghost" style="top:40%; left:60%;"><i class="fas fa-ghost"></i></div>
  </div>

  <div class="particles" id="particles"></div>

  <div class="loading-container">
    <div class="logo">
      <i class="fas fa-ghost"></i>
    </div>
    <h1>Entering the Whisper Realm</h1>
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="loading-text" id="loadingText">Initializing spectral gateway...</div>

    <div class="btn-group">
      <a href="help.html" class="btn" aria-label="Skip to Whisper Wall Help">
        <i class="fas fa-forward"></i> Skip Loading
      </a>
      <button class="btn btn-outline" onclick="location.href='post.html'" aria-label="Post a new confession">
        <i class="fas fa-fire"></i> Confess Now
      </button>
    </div>
  </div>

  <script>
    // Simulate loading progress with dynamic messages
    const progressBar = document.getElementById('progressBar');
    const loadingText = document.getElementById('loadingText');
    let progress = 0;
    
    const messages = [
      "Initializing spectral gateway...",
      "Connecting to ethereal network...",
      "Authenticating whispers...",
      "Calibrating ghostly frequencies...",
      "Finalizing portal stabilization...",
      "Ready to enter the Whisper Realm"
    ];
    
    const interval = setInterval(() => {
      progress += Math.random() * 8 + 4;
      if (progress > 100) {
        progress = 100;
        clearInterval(interval);
        loadingText.textContent = messages[messages.length - 1];
        setTimeout(() => {
          window.location.href = "help.html";
        }, 500);
      } else {
        const messageIndex = Math.floor(progress / (100 / (messages.length - 1)));
        loadingText.textContent = messages[messageIndex];
      }
      progressBar.style.width = `${progress}%`;
    }, 400);

    // Create floating particles
    const particlesContainer = document.getElementById('particles');
    const particleCount = window.innerWidth < 600 ? 30 : 50;
    
    for (let i = 0; i < particleCount; i++) {
      const particle = document.createElement('div');
      particle.classList.add('particle');
      
      // Random properties
      const size = Math.random() * 5 + 1;
      const posX = Math.random() * window.innerWidth;
      const posY = Math.random() * window.innerHeight;
      const opacity = Math.random() * 0.5 + 0.1;
      const animationDuration = Math.random() * 20 + 10;
      const delay = Math.random() * 5;
      
      particle.style.width = `${size}px`;
      particle.style.height = `${size}px`;
      particle.style.left = `${posX}px`;
      particle.style.top = `${posY}px`;
      particle.style.opacity = opacity;
      particle.style.animation = `floatParticle ${animationDuration}s linear ${delay}s infinite`;
      
      particlesContainer.appendChild(particle);
    }

    // Add animation for particles
    const style = document.createElement('style');
    style.textContent = `
      @keyframes floatParticle {
        0% {
          transform: translate(0, 0);
        }
        25% {
          transform: translate(${Math.random() * 100 - 50}px, ${Math.random() * 50 - 25}px);
        }
        50% {
          transform: translate(${Math.random() * 100 - 50}px, ${Math.random() * 50 - 25}px);
        }
        75% {
          transform: translate(${Math.random() * 100 - 50}px, ${Math.random() * 50 - 25}px);
        }
        100% {
          transform: translate(0, 0);
        }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
